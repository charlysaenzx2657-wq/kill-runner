name: Build KILL Runner APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Build APK Release (sin firmar)
        run: ./gradlew assembleRelease --no-daemon

      - name: Subir APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: KillRunner-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Subir APK Release
        uses: actions/upload-artifact@v4
        with:
          name: KillRunner-Release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Mostrar info del APK
        run: |
          echo "=== APK Debug ==="
          ls -lh app/build/outputs/apk/debug/
          echo "=== APK Release ==="
          ls -lh app/build/outputs/apk/release/

